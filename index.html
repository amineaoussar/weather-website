<!DOCTYPE html>
<html>
    <head>
        <title>Weather in Beni Mellal</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale = 1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="images/page icon.png">

    </head>

    <body >

        <header>
            <h1 id="header-title">Weather in Beni Mellal </h1>
            <img id="top-icon" src="images/cloudy.png" alt="error" width="250">

            
        </header>

        <nav  >
            <div id="nav-bar">
                <button class="nav-buttons">Monday</button><button class="nav-buttons">Tuesday</button><button class="nav-buttons">Wednesday</button><button class="nav-buttons">Thursday</button><button class="nav-buttons">Friday</button><button class="nav-buttons">Saturday</button> <button class="nav-buttons">Sunday</button>
            </div>
           
        </nav>

        <main>
            <h1 id="main-title">Today</h1>

            <div id="main-content">
        
                <div id="left-part">
                    <table id="main-table">
                    <tr class="rows">
                        <td class="col1"><h3 class="data">average Tempreture:</h3></td>
                        <td class="col2"><h3 class="data">0°</h3></td>
                        <td class="col3"><img class="symbols" src="images/tempreture.png" alt="error"></td>
                    </tr>
                    <tr class="rows">
                        <td class="col1"><h3 class="data">humidity:</h3></td>
                        <td class="col2"><h3 class="data">0%</h3></td>
                        <td class="col3"><img class="symbols" src="images/humidity.png" alt="error"></td>
                    </tr>
                    <tr class="rows">
                        <td class="col1"><h3 class="data">wind speed:</h3></td>
                        <td class="col2"><h3 class="data">0km/h</h3></td>
                        <td class="col3"><img class="symbols" src="images/wind.png" alt="error"></td>
                    </tr>
                    <tr class="rows">
                        <td class="col1"><h3 class="data">Precipitaion:</h3></td>
                        <td class="col2"><h3 class="data">0.0mm</h3></td>
                        <td class="col3"><img class="symbols" src="images/precipitation.png" alt="error"></td>
                    </tr>
                    </table>
                </div>

                <div id="main-image-container">
                <img id="im1" class="weather-cases" src="images/sunny.png" alt="error">
                <img id="im2" class="weather-cases" src="images/foggy.png" alt="error">
                <img id="im3" class="weather-cases" src="images/rainy.png" alt="error">
                <img id="im4" class="weather-cases" src="images/partly-cloudy.png" alt="error">
                </div>

            </div>

        </main>

    </body>


</html>
