<!DOCTYPE html>
<html>

<head>
    <title>Weather in Beni Mellal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale = 1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/page icon.png">

</head>

<body>

    <header>
        <h1 id="header-title"></h1>

    </header>


    <main>

        <div id="titles-container">
            <h1 id="main-title"></h1>
        </div>

        <div id="main-container">

            <div id="today-container">
                <div id="left-part">

                    <div class="data-containers">
                        <h2 class="data">Tempreture:</h2>
                        <h2 class="data">humidity:</h2>
                        <h2 class="data">Precipitaion:</h2>
                        <h2 class="data">Wind speed:</h2>
                    </div>

                    <div class="data-containers">
                        <h2 class="data" id="tempreture"></h2>
                        <h2 class="data" id="humidity"></h2>
                        <h2 class="data" id="precipitation"></h2>
                        <h2 class="data" id="windspeed"></h2>
                    </div>

                    <div class="data-containers">
                        <img class="symbols" src="images/tempreture.png" alt="tempreture">
                        <img class="symbols" src="images/humidity.png" alt="humidity">
                        <img class="symbols" src="images/precipitation.png" alt="precipitation">
                        <img class="symbols" src="images/wind.png" alt="wind">
                    </div>

                </div>

                <div id="right-part">

                    <canvas id="data-graph" width="800" height="400"></canvas>

                    <div id="time-data">
                        <div class="time-bar">
                            <h3 class="right-data">1</h3>
                            <h3 class="right-data">2</h3>
                            <h3 class="right-data">3</h3>
                            <h3 class="right-data">4</h3>
                            <h3 class="right-data">5</h3>
                            <h3 class="right-data">6</h3>
                            <h3 class="right-data">7</h3>
                            <h3 class="right-data">8</h3>
                        </div>
                        <div class="time-bar">
                            <h3 class="right-data">9</h3>
                            <h3 class="right-data">10</h3>
                            <h3 class="right-data">11</h3>
                            <h3 class="right-data">12</h3>
                            <h3 class="right-data">13</h3>
                            <h3 class="right-data">14</h3>
                            <h3 class="right-data">15</h3>
                            <h3 class="right-data">16</h3>
                        </div>
                        <div class="time-bar">
                            <h3 class="right-data">17</h3>
                            <h3 class="right-data">18</h3>
                            <h3 class="right-data">19</h3>
                            <h3 class="right-data">20</h3>
                            <h3 class="right-data">21</h3>
                            <h3 class="right-data">22</h3>
                            <h3 class="right-data">23</h3>
                            <h3 class="right-data">24</h3>
                        </div>





                    </div>

                </div>

                

            </div>

        </div>
        
        <div id="loading-screen">
                    <br><br>
                    <h1>Loading...</h1>
        </div>
    </main>

    <script src="script.js"></script>
</body>


</html>
